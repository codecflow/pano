name: Build and Release on Alpine

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        apk update
        apk add --no-cache \
          webkit2gtk-4.1-dev \
          gtk+3.0-dev \
          pango-dev \
          cairo-dev \
          gcc \
          make \
          pkgconfig \
          libx11-dev \
          libxcb-dev \
          libxkbcommon-dev \
          glib-dev \
          at-spi2-core-dev \
          gdk-pixbuf-dev \
          musl-dev \
          rust \
          cargo

    - name: Set environment variables
      run: |
        echo "PKG_CONFIG_PATH=/usr/lib/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
        echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
        echo "CARGO_BUILD_JOBS=1" >> $GITHUB_ENV

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: alpine-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --release

    - name: Upload Alpine artifact
      uses: actions/upload-artifact@v4
      with:
        name: pano-alpine-${{ github.ref_name }}
        path: target/release/pano

  
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download Release Asset
      uses: actions/download-artifact@v4
      with:
        name: pano-alpine-${{ github.ref_name }}
        path: release/

    - name: Rename file with version
      run: |
        cd release
        mv pano pano-alpine-${{ github.ref_name }}

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
